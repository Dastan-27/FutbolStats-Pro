services:
  - type: web
    name: futbol-backend
    env: node
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        fromDatabase:
          name: futbol-db
          property: connectionString

databases:
  - name: futbol-db
    databaseName: futbol_db
    user: postgres
